  <!-- Dynamic Content Section -->
  <section class="catalog-section py-5 pb-5" style="min-height: 85vh;">
    <div class="container" id="prod-detail-container">
      <!-- Injected via JS -->
      <div class="text-center text-white" style="padding: 100px 0;">
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const prodId = parseInt(urlParams.get('id'));

      // If data is available globally
      if (typeof arpData !== 'undefined' && arpData.products) {
        const prodData = arpData.products.find(s => s.id === prodId);
        renderProductDetails(prodData);
      } else {
        document.getElementById('prod-detail-container').innerHTML = `<div class="alert alert-danger">Error: Datos del producto no cargados. Intenta de nuevo desde el catálogo.</div>`;
      }
    });

    function renderProductDetails(prod) {
      if (!prod) {
        document.getElementById('prod-detail-container').innerHTML = `<h2 class="text-white text-center py-5">Producto no encontrado</h2><div class="text-center"><a href="productos.html" class="btn btn-arp btn-arp-outline">Volver a Productos</a></div>`;
        return;
      }

      document.title = `AR Performance | ${prod.name}`;

      let imageHTML = '';
      if (prod.images && prod.images.length > 1) {
        let indicators = '';
        let items = '';
        prod.images.forEach((img, i) => {
          indicators += `<button type="button" data-bs-target="#productCarousel" data-bs-slide-to="${i}" class="${i === 0 ? 'active' : ''}"></button>`;
          items += `
            <div class="carousel-item ${i === 0 ? 'active' : ''}">
              <img src="${img}" class="d-block w-100 img-fluid" style="max-height: 500px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));" alt="${prod.name} ${i + 1}">
            </div>
          `;
        });

        imageHTML = `
          <div id="productCarousel" class="carousel slide" data-bs-touch="true">
            <div class="carousel-indicators">
              ${indicators}
            </div>
            <div class="carousel-inner">
              ${items}
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Siguiente</span>
            </button>
          </div>
        `;
      } else {
        const singleImage = (prod.images && prod.images.length > 0) ? prod.images[0] : prod.image;
        imageHTML = `<img src="${singleImage}" alt="${prod.name}" class="img-fluid" style="max-height: 500px; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));">`;
      }

      const html = `
        <div class="row align-items-center">
          <div class="col-md-5 mb-4 mb-md-0 text-center">
             <div class="p-4" style="background: rgba(10,10,12,0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;">
               ${imageHTML}
             </div>
          </div>
          
          <div class="col-md-7 ps-md-5">
            <a href="productos.html" class="text-muted text-decoration-none small fw-bold mb-3 d-inline-block" style="letter-spacing: 1px;">&larr; VOLVER A PRODUCTOS</a>
            
            <div class="mb-3">
              <span class="stage-badge-square">${prod.brand || 'RACE GAS'}</span>
              <span class="text-muted small ms-3 fw-bold text-uppercase">${prod.type}</span>
            </div>
            
            <h1 class="display-5 fw-bold text-white mb-2" style="letter-spacing: -1px;">${prod.slogan}</h1>
            <p class="h4 text-danger mb-4 fw-bold">DISPONIBLE AHORA</p>
            
            <p class="lead mb-5" style="color: #999;">${prod.description}</p>
            
            <div class="row mb-5 g-3">
              <div class="col-6">
                <div class="p-3 card-arp h-100 text-center" style="border: 1px solid #222;">
                   <h3 class="fw-bold mb-1 text-white">${prod.octane_boost}</h3>
                   <span class="text-secondary small fw-bold text-uppercase" style="letter-spacing: 1px;">Poder de Octanaje</span>
                </div>
              </div>
              <div class="col-6">
                <div class="p-3 card-arp h-100 text-center" style="border: 1px solid #222;">
                   <h3 class="fw-bold mb-1 text-white">${prod.volume}</h3>
                   <span class="text-secondary small fw-bold text-uppercase" style="letter-spacing: 1px;">Presentación</span>
                </div>
              </div>
            </div>

            <div class="d-flex gap-3">
              <a href="https://wa.me/573156662073?text=Hola,%20me%20gustaría%20ordenar%20el%20aditivo%20${encodeURIComponent(prod.name)}" class="btn btn-arp btn-arp-danger px-5 py-3 fw-bold w-100" target="_blank" style="font-size: 1.1rem; letter-spacing: 1px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-whatsapp me-2 mb-1" viewBox="0 0 16 16">
                  <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.05-.084-.182-.133-.38-.232"/>
                </svg>
                COMPRAR RECIPIENTE
              </a>
            </div>
          </div>
        </div>
      `;

      // Build product image showcase if multiple images exist
      let showcaseHTML = '';
      if (prod.images && prod.images.length > 1) {
        const mainImg = prod.images[0];
        const secondaryImgs = prod.images.slice(1);
        const secondaryCols = secondaryImgs.map(img => `
          <div class="col">
            <img src="${img}" alt="${prod.name}" class="potencia-img-secondary">
          </div>
        `).join('');

        showcaseHTML = `
          <div class="potencia-section mt-5 pt-5 pb-5" style="margin-left: -12px; margin-right: -12px; padding-left: 12px; padding-right: 12px;">
            <div class="text-center mb-5">
              <span class="potencia-label">Galería del Producto</span>
              <h2 class="display-4 fw-bold text-white mb-2" style="letter-spacing: -1px;">
                VISTO DE <span style="color: var(--accent-red);">CERCA</span>
              </h2>
              <p class="text-secondary" style="max-width: 500px; margin: 0 auto;">Calidad de competición en cada detalle.</p>
            </div>

            <div class="row justify-content-center mb-4">
              <div class="col-12">
                <div class="potencia-hero-wrap">
                  <span class="potencia-label ps-2" style="padding-top: 8px; display: inline-block;">&#128247; Vista Principal</span>
                  <img src="${mainImg}" alt="${prod.name}" class="potencia-img-hero" style="max-height: 500px; object-fit: contain;">
                </div>
              </div>
            </div>

            ${secondaryCols.length ? `
            <div class="row row-cols-2 row-cols-md-${Math.min(secondaryImgs.length, 4)} g-3">
              ${secondaryCols}
            </div>` : ''}

            <div class="text-center mt-5">
              <a href="https://wa.me/573156662073?text=Hola,%20quiero%20pedir%20${encodeURIComponent(prod.name)}"
                 class="btn btn-arp btn-arp-danger px-5 py-3 fw-bold" target="_blank" style="letter-spacing: 1px;">
                &#9889; QUIERO ESTE PRODUCTO
              </a>
            </div>
          </div>
        `;
      }

      document.getElementById('prod-detail-container').innerHTML = html + showcaseHTML;
      document.getElementById('prod-detail-container').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('prod-detail-container').style.transition = 'opacity 0.6s ease';
        document.getElementById('prod-detail-container').style.opacity = '1';
      }, 50);
    }
  </script>
