  <script>
    // Intersection Observer for scroll animations
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.1
    };

    const observer = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    try {
      const container = document.getElementById('catalog-container');
      const productsContainer = document.getElementById('products-container');
      const allProducts = typeof arpData !== 'undefined' ? (arpData.products || []) : [];

      function renderProducts(filterType = 'All') {
        productsContainer.innerHTML = '';
        const filtered = filterType === 'All'
          ? allProducts
          : allProducts.filter(p => p.type === filterType);

        if (filtered.length === 0) {
          productsContainer.innerHTML = '<p class="text-secondary text-center w-100">Pronto llegarán nuevos productos a esta categoría.</p>';
        }

        filtered.forEach((product, index) => {
          const activeClass = product.is_best_seller ? 'card-arp-active' : '';
          const btnClass = product.is_best_seller ? 'btn-arp-danger' : 'btn-arp-outline';

          const cardHTML = `
                            <div class="col-md-6 col-lg-6 fade-in" style="transition-delay: ${index * 0.1}s">
                              <a href="producto-detalle.html?id=${product.id}" class="text-decoration-none">
                                <div class="card card-arp h-100 ${activeClass}">
                                    <img src="${product.image}" 
                                         class="card-img-top img-performance" 
                                         alt="${product.name}"
                                         onerror="this.src='https://via.placeholder.com/500x300/111/444?text=AR+Performance'">
                                    
                                    <div class="p-4">
                                        <div class="d-flex justify-content-between align-items-center mb-3">
                                            <span class="stage-badge-square">${product.brand || 'RACE GAS'}</span>
                                            <span class="text-muted small" style="font-size: 0.75rem;">Aditivo</span>
                                        </div>
                                        <h3 class="h4 fw-bold text-white mb-2" style="letter-spacing:-0.5px">${product.slogan}</h3>
                                        <p class="text-muted small mb-0" style="line-height: 1.5; color: #888 !important; min-height: 45px">${product.description}</p>
                                        
                                        <div class="stats-grid mb-4">
                                            <div>
                                                <span class="stat-val text-white">${product.octane_boost}</span>
                                                <span class="stat-label">OCTANAJE</span>
                                            </div>
                                            <div>
                                                <span class="stat-val text-white">${product.volume}</span>
                                                <span class="stat-label">VOLUMEN</span>
                                            </div>
                                        </div>
                                        <span class="btn ${btnClass} w-100 btn-arp">VER DETALLES</span>
                                    </div>
                                </div>
                              </a>
                            </div>
                        `;
          productsContainer.innerHTML += cardHTML;
        });

        // Trigger observer on dynamic cards
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
      }

      // Initial Render
      renderProducts('All');

      // Filter Listeners
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('btn-arp-danger');
            b.classList.add('btn-arp-outline');
          });
          e.target.classList.remove('btn-arp-outline');
          e.target.classList.add('btn-arp-danger');

          const type = e.target.getAttribute('data-filter');
          renderProducts(type);
        });
      });

    } catch (error) {
      console.error('Error cargando ARP Data:', error);
      document.getElementById('products-container').innerHTML = `<p class="text-danger text-center">Error al cargar el catálogo de productos.</p>`;
    }

    // Initialize observers for static elements
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
