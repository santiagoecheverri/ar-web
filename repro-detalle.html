    /* ── Dyno SVG Generator ── */
    function buildDynoSVG(hpS, hpT) {
      const W = 640, H = 200, L = 48, T = 12, R = 628, B = 172;
      const pw = R - L, ph = B - T;
      const maxHP = Math.ceil(hpT * 1.12 / 50) * 50;
      const TUNED = [0.04,0.12,0.27,0.50,0.72,0.87,0.94,0.98,1.00,0.99,0.95,0.87,0.74];
      const STOCK = [0.04,0.12,0.26,0.47,0.68,0.82,0.89,0.94,1.00,0.99,0.94,0.85,0.71];
      const tVals = TUNED.map(p => p * hpT);
      const sVals = STOCK.map(p => p * hpS);
      const px = i => L + (i / 12) * pw;
      const py = hp => B - (hp / maxHP) * ph;
      function smoothPath(vals) {
        const pts = vals.map((hp, i) => [px(i), py(hp)]);
        let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
        for (let i = 1; i < pts.length; i++) {
          const mx = ((pts[i-1][0] + pts[i][0]) / 2).toFixed(1);
          d += ` C ${mx} ${pts[i-1][1].toFixed(1)} ${mx} ${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)} ${pts[i][1].toFixed(1)}`;
        }
        return d;
      }
      const fillPts = [
        ...tVals.map((hp,i) => `${px(i).toFixed(1)},${py(hp).toFixed(1)}`),
        ...[...sVals].reverse().map((hp,i) => `${px(12-i).toFixed(1)},${py(hp).toFixed(1)}`)
      ].join(' ');
      const grid = [0,0.25,0.5,0.75,1].map(p => {
        const y = py(maxHP*p).toFixed(1);
        return `<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" stroke="#181818" stroke-width="1"/>
                <text x="${L-5}" y="${(parseFloat(y)+4).toFixed(1)}" fill="#333" font-size="9" text-anchor="end">${Math.round(maxHP*p)}</text>`;
      }).join('');
      const rpmLabels = [1,2,3,4,5,6,7].map(r => {
        const x = px((r-1)*2).toFixed(1);
        return `<text x="${x}" y="${B+14}" fill="#333" font-size="9" text-anchor="middle">${r}k</text>`;
      }).join('');
      const txp = px(8).toFixed(1), typ = py(hpT).toFixed(1);
      const sxp = px(8).toFixed(1), syp = py(hpS).toFixed(1);
      return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="dyno-svg-el">
        <defs>
          <linearGradient id="dg${hpT}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#E63946" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#E63946" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        ${grid}${rpmLabels}
        <text x="${(L-34).toFixed(1)}" y="${((T+B)/2).toFixed(1)}" fill="#333" font-size="9" text-anchor="middle"
              transform="rotate(-90,${(L-34).toFixed(1)},${((T+B)/2).toFixed(1)})">HP</text>
        <text x="${(L+pw/2).toFixed(1)}" y="${H-2}" fill="#333" font-size="9" text-anchor="middle">RPM</text>
        <polygon points="${fillPts}" fill="url(#dg${hpT})"/>
        <path d="${smoothPath(sVals)}" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5 3"/>
        <path d="${smoothPath(tVals)}" fill="none" stroke="#E63946" stroke-width="2.5"/>
        <circle cx="${txp}" cy="${typ}" r="4" fill="#E63946"/>
        <text x="${(parseFloat(txp)+8).toFixed(1)}" y="${(parseFloat(typ)+4).toFixed(1)}" fill="#E63946" font-size="10" font-weight="bold">${hpT} HP</text>
        <circle cx="${sxp}" cy="${syp}" r="3" fill="#333"/>
        <text x="${(parseFloat(sxp)+8).toFixed(1)}" y="${(parseFloat(syp)+4).toFixed(1)}" fill="#444" font-size="10">${hpS} HP</text>
      </svg>`;
    }

    /* ── Scroll-triggered animations ── */
    function initProofsAnimations() {
      const section = document.querySelector('.proofs-section');
      if (!section) return;
      let fired = false;
      new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !fired) {
          fired = true;
          // Count-up
          section.querySelectorAll('.ba-count[data-count]').forEach(el => {
            const target = parseInt(el.dataset.count), dur = 1500;
            const start = performance.now();
            const tick = now => {
              const t = Math.min((now - start) / dur, 1);
              el.textContent = Math.round((1 - Math.pow(1 - t, 3)) * target);
              if (t < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          });
          // Bar fills
          section.querySelectorAll('.comp-fill[data-w]').forEach((el, i) => {
            setTimeout(() => {
              el.style.transition = 'width 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
              el.style.width = el.dataset.w + '%';
            }, 200 + i * 130);
          });
        }
      }, { threshold: 0.12 }).observe(section);
    }

      const proofsHTML = extras.hp_tuned ? buildProofsSection(stage, extras) : '';

      const el = document.getElementById('stage-content');
      el.style.opacity = '0';
      el.innerHTML = summaryHTML + proofsHTML;
      requestAnimationFrame(() => {
        el.style.transition = 'opacity 0.4s ease';
        el.style.opacity = '1';
        initProofsAnimations();
      });
    }

    /* ════════════════════════════════════════════════
       CAR PAGE RENDERER  –  hero + tabs + content
    ════════════════════════════════════════════════ */
    function renderCarPage(carKey, defaultId) {
      const stages = (arpData.performance_stages || []).filter(s => s.car === carKey);
      if (!stages.length) {
        document.getElementById('repro-detail-container').innerHTML =
          `<h2 class="text-white text-center py-5">Plataforma no encontrada</h2>
           <div class="text-center"><a href="repros.html" class="btn btn-arp btn-arp-outline">Volver al Catálogo</a></div>`;
        return;
      }

      const carNames = { mk7: 'Golf GTI MK7 / MK7.5', rs3: 'Audi RS3 8Y' };
      const carName = carNames[carKey] || carKey.toUpperCase();
      const maxHP = Math.max(...stages.map(s => (stageExtras[s.id] || {}).hp_tuned || 0));
      document.title = `AR Performance | ${carName}`;

      const tabsHTML = stages.map((s, i) => {
        const ex = stageExtras[s.id] || {};
        const isActive = defaultId ? s.id === defaultId : i === 0;
        return `<button class="stage-tab ${isActive ? 'stage-tab-active' : ''}" data-id="${s.id}">
          <div class="st-inner">
            <span class="st-name">${s.name}</span>
            <div class="st-hp-wrap">
              <span class="st-hp">${ex.hp_tuned || '?'}</span>
              <span class="st-hp-unit">HP</span>
            </div>
            <span class="st-gain">${s.hp_gain}</span>
          </div>
        </button>`;
      }).join('');

      const carImg = stages[0].image;
      const addonsHTML = buildAddonsSection(stages[0]);

      document.getElementById('repro-detail-container').innerHTML = `
        <div class="car-hero">
          <div class="container">
            <a href="repros.html" class="back-link">&#8592; VOLVER AL CATÁLOGO</a>
            <div class="car-hero-inner">
              <div class="car-hero-text">
                <span class="proofs-eyebrow">VAG Specialist · Ibagué, Colombia</span>
                <h1 class="car-hero-title">${carName}</h1>
                <p class="car-hero-sub">${stages.length} stages disponibles &nbsp;·&nbsp; Hasta <strong style="color:#fff">${maxHP} HP</strong></p>
              </div>
              <div class="car-hero-img-wrap">
                <div class="car-hero-glow"></div>
                <img src="${carImg}" alt="${carName}" class="car-hero-img">
              </div>
            </div>
          </div>
        </div>

        <div class="stage-tabs-section">
          <div class="container">
            <div class="stage-tabs-row">${tabsHTML}</div>
          </div>
        </div>

        <div id="stage-content"></div>

        ${addonsHTML}`;

      /* Tab click events */
      document.querySelectorAll('.stage-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.stage-tab').forEach(b => b.classList.remove('stage-tab-active'));
          btn.classList.add('stage-tab-active');
          const stage = stages.find(s => s.id === parseInt(btn.dataset.id));
          renderStageContent(stage);
        });
      });

      /* Render default stage */
      const defaultStage = defaultId
        ? (stages.find(s => s.id === defaultId) || stages[0])
        : stages[0];
      renderStageContent(defaultStage);
    }

    /* ── Kept for reference: old buildStageComparison no longer needed ── */
    function buildStageComparison(currentStage) {
      if (!arpData || !arpData.performance_stages) return '';
      const siblings = arpData.performance_stages.filter(s => s.car === currentStage.car);
      if (siblings.length < 2) return '';

      const cols = siblings.map(s => {
        const ex = stageExtras[s.id] || {};
        const isCurrent = s.id === currentStage.id;
        const waText = encodeURIComponent('Hola, quiero saber más sobre la reprogramación ' + s.slogan);
        return `
          <div class="sc-col ${isCurrent ? 'sc-col-active' : ''}">
            ${isCurrent ? '<div class="sc-current-badge">ACTUAL</div>' : ''}
            <div class="sc-name">${s.name}</div>
            <div class="sc-type">${s.type}</div>
            <div class="sc-nums">
              <div class="sc-num-row">
                <span class="sc-num-val ${isCurrent ? 'sc-num-red' : ''}">${ex.hp_tuned || '—'}</span>
                <span class="sc-num-unit">HP</span>
              </div>
              <div class="sc-num-row">
                <span class="sc-num-val ${isCurrent ? 'sc-num-red' : ''}">${ex.nm_tuned || '—'}</span>
                <span class="sc-num-unit">Nm</span>
              </div>
            </div>
            <div class="sc-gain-row">
              <span class="sc-gain">${s.hp_gain}</span>
              <span class="sc-gain">${s.torque_gain}</span>
            </div>
            <div class="sc-fuel">${ex.fuel || ''}</div>
            <a href="repro-detalle.html?id=${s.id}"
               class="sc-cta ${isCurrent ? 'sc-cta-active' : ''}"
               ${isCurrent ? 'aria-current="page"' : ''}>
              ${isCurrent ? 'VIENDO AHORA' : 'VER DETALLE →'}
            </a>
          </div>`;
      }).join('');

      return `
      <section class="sc-section">
        <div class="sc-header text-center">
          <span class="proofs-eyebrow">Elige tu nivel</span>
          <h2 class="proofs-title">COMPARATIVA <span class="proofs-accent">DE STAGES</span></h2>
          <p class="proofs-sub">Todos los stages disponibles para tu plataforma.</p>
        </div>
        <div class="sc-grid">${cols}</div>
      </section>`;
    }

        {

          <a href="${a.wa}" target="_blank" class="addon-cta">AGREGAR AL PAQUETE →</a>

      return `
      <section class="addons-section">
        <div class="sc-header text-center">
          <span class="proofs-eyebrow">Lleva tu build más lejos</span>

          <p class="proofs-sub">Combina con tu Stage para un resultado definitivo.</p>

        <div class="addons-grid">${cards}</div>

    /* ════════════════════════════════════════════════
       ENTRY POINT
    ════════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof arpData === 'undefined') {
        document.getElementById('repro-detail-container').innerHTML =
          `<div class="alert alert-danger m-4">Error: Datos no disponibles. <a href="repros.html">Volver al catálogo</a></div>`;
        return;
      }

      const params = new URLSearchParams(window.location.search);
      let carKey = params.get('car');
      let defaultId = null;

      /* Backwards compat: ?id=2 → detect car */
      if (!carKey) {
        const reproId = parseInt(params.get('id'));
        if (!isNaN(reproId)) {
          const found = arpData.performance_stages.find(s => s.id === reproId);
          if (found) { carKey = found.car; defaultId = found.id; }
        }
      }

      if (carKey) {
        renderCarPage(carKey, defaultId);
      } else {
        document.getElementById('repro-detail-container').innerHTML =
          `<h2 class="text-white text-center py-5">Selecciona una plataforma</h2>
           <div class="text-center"><a href="repros.html" class="btn btn-arp btn-arp-outline">Ver Catálogo</a></div>`;
      }
    });
  </script>
