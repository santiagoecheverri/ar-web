    /* ── Dyno SVG Generator ── */
    function buildDynoSVG(hpS, hpT) {
      const W = 640, H = 200, L = 48, T = 12, R = 628, B = 172;
      const pw = R - L, ph = B - T;
      const maxHP = Math.ceil(hpT * 1.12 / 50) * 50;
      const TUNED = [0.04,0.12,0.27,0.50,0.72,0.87,0.94,0.98,1.00,0.99,0.95,0.87,0.74];
      const STOCK = [0.04,0.12,0.26,0.47,0.68,0.82,0.89,0.94,1.00,0.99,0.94,0.85,0.71];
      const tVals = TUNED.map(p => p * hpT);
      const sVals = STOCK.map(p => p * hpS);
      const px = i => L + (i / 12) * pw;
      const py = hp => B - (hp / maxHP) * ph;
      function smoothPath(vals) {
        const pts = vals.map((hp, i) => [px(i), py(hp)]);
        let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
        for (let i = 1; i < pts.length; i++) {
          const mx = ((pts[i-1][0] + pts[i][0]) / 2).toFixed(1);
          d += ` C ${mx} ${pts[i-1][1].toFixed(1)} ${mx} ${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)} ${pts[i][1].toFixed(1)}`;
        }
        return d;
      }
      const fillPts = [
        ...tVals.map((hp,i) => `${px(i).toFixed(1)},${py(hp).toFixed(1)}`),
        ...[...sVals].reverse().map((hp,i) => `${px(12-i).toFixed(1)},${py(hp).toFixed(1)}`)
      ].join(' ');
      const grid = [0,0.25,0.5,0.75,1].map(p => {
        const y = py(maxHP*p).toFixed(1);
        return `<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" stroke="#181818" stroke-width="1"/>
                <text x="${L-5}" y="${(parseFloat(y)+4).toFixed(1)}" fill="#333" font-size="9" text-anchor="end">${Math.round(maxHP*p)}</text>`;
      }).join('');
      const rpmLabels = [1,2,3,4,5,6,7].map(r => {
        const x = px((r-1)*2).toFixed(1);
        return `<text x="${x}" y="${B+14}" fill="#333" font-size="9" text-anchor="middle">${r}k</text>`;
      }).join('');
      const txp = px(8).toFixed(1), typ = py(hpT).toFixed(1);
      const sxp = px(8).toFixed(1), syp = py(hpS).toFixed(1);
      return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="dyno-svg-el">
        <defs>
          <linearGradient id="dg${hpT}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#E63946" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#E63946" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        ${grid}${rpmLabels}
        <text x="${(L-34).toFixed(1)}" y="${((T+B)/2).toFixed(1)}" fill="#333" font-size="9" text-anchor="middle"
              transform="rotate(-90,${(L-34).toFixed(1)},${((T+B)/2).toFixed(1)})">HP</text>
        <text x="${(L+pw/2).toFixed(1)}" y="${H-2}" fill="#333" font-size="9" text-anchor="middle">RPM</text>
        <polygon points="${fillPts}" fill="url(#dg${hpT})"/>
        <path d="${smoothPath(sVals)}" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5 3"/>
        <path d="${smoothPath(tVals)}" fill="none" stroke="#E63946" stroke-width="2.5"/>
        <circle cx="${txp}" cy="${typ}" r="4" fill="#E63946"/>
        <text x="${(parseFloat(txp)+8).toFixed(1)}" y="${(parseFloat(typ)+4).toFixed(1)}" fill="#E63946" font-size="10" font-weight="bold">${hpT} HP</text>
        <circle cx="${sxp}" cy="${syp}" r="3" fill="#333"/>
        <text x="${(parseFloat(sxp)+8).toFixed(1)}" y="${(parseFloat(syp)+4).toFixed(1)}" fill="#444" font-size="10">${hpS} HP</text>
      </svg>`;
    }

    /* ── Scroll-triggered animations ── */
    function initProofsAnimations() {
      const section = document.querySelector('.proofs-section');
      if (!section) return;
      let fired = false;
      new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !fired) {
          fired = true;
          // Count-up
          section.querySelectorAll('.ba-count[data-count]').forEach(el => {
            const target = parseInt(el.dataset.count), dur = 1500;
            const start = performance.now();
            const tick = now => {
              const t = Math.min((now - start) / dur, 1);
              el.textContent = Math.round((1 - Math.pow(1 - t, 3)) * target);
              if (t < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          });
          // Bar fills
          section.querySelectorAll('.comp-fill[data-w]').forEach((el, i) => {
            setTimeout(() => {
              el.style.transition = 'width 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
              el.style.width = el.dataset.w + '%';
            }, 200 + i * 130);
          });
        }
      }, { threshold: 0.12 }).observe(section);
    }

                   style="z-index:1;filter:drop-shadow(0 20px 30px rgba(0,0,0,0.8));">
            </div>
          </div>
        </div>`;

      const extras = stageExtras[stage.id] || {};
      const proofsHTML = extras.hp_tuned ? buildProofsSection(stage, extras) : '';

      document.getElementById('repro-detail-container').innerHTML = html + proofsHTML;
      document.getElementById('repro-detail-container').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('repro-detail-container').style.transition = 'opacity 0.6s ease';
        document.getElementById('repro-detail-container').style.opacity = '1';
        initProofsAnimations();
      }, 50);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const reproId = parseInt(urlParams.get('id'));
      if (typeof arpData !== 'undefined' && arpData.performance_stages) {
        const stageData = arpData.performance_stages.find(s => s.id === reproId);
        renderReproDetails(stageData);
      } else {
        document.getElementById('repro-detail-container').innerHTML =
          `<div class="alert alert-danger">Error: Datos de reprogramación no disponibles. Intenta volviendo al catálogo.</div>`;
      }
    });
  </script>
